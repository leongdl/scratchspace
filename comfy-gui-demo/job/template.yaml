specificationVersion: 'jobtemplate-2023-09'
name: ComfyUI-GUI-SSM
parameterDefinitions:
- name: Message
  type: STRING
  default: Starting ComfyUI GUI session with SSM access
- name: ActivationCode
  type: STRING
  description: >
    SSM hybrid activation code from aws ssm create-activation.
    Generated by the submit script before job submission.
- name: ActivationId
  type: STRING
  description: >
    SSM hybrid activation ID from aws ssm create-activation.
    Generated by the submit script before job submission.
- name: AWS_REGION
  type: STRING
  default: us-west-2
- name: SessionMinutes
  type: INT
  default: 120
  description: How many minutes to keep the ComfyUI session alive.
- name: ECR_REGISTRY
  type: STRING
  description: ECR registry URL (e.g. 123456789.dkr.ecr.us-west-2.amazonaws.com)
- name: COMFYUI_REPOSITORY
  type: STRING
  default: comfyui
  description: ECR repository name
- name: COMFYUI_TAG
  type: STRING
  default: latest
  description: Docker image tag
- name: COMFYUI_PORT
  type: INT
  default: 8188
  description: Port ComfyUI listens on inside the container.
steps:
- name: ComfyUISession
  script:
    actions:
      onRun:
        command: bash
        args: ['{{Task.File.Run}}']
    embeddedFiles:
    - name: Run
      type: TEXT
      data: |
        #!/bin/bash
        set -e

        echo '{{Param.Message}}'
        echo "=============================================="
        echo "ComfyUI GUI Session with SSM Port Forwarding"
        echo "=============================================="
        echo "User: $(whoami)"
        echo "Dir:  $(pwd)"
        echo "Host: $(hostname)"
        echo "Region: {{Param.AWS_REGION}}"
        echo "Session: {{Param.SessionMinutes}} minutes"
        echo "ComfyUI Port: {{Param.COMFYUI_PORT}}"
        echo ""

        # ==============================================
        # PHASE 1: Pull and start ComfyUI container
        # ==============================================

        # --- Cleanup orphaned containers ---
        docker stop comfyui-gui 2>/dev/null || true
        docker rm comfyui-gui 2>/dev/null || true
        docker container prune -f

        # --- ECR login ---
        echo "Logging in to ECR..."
        aws ecr get-login-password --region {{Param.AWS_REGION}} \
          | docker login --username AWS --password-stdin {{Param.ECR_REGISTRY}}

        # --- Smart pull: skip if local image digest matches ECR ---
        cat > /tmp/get_digest.py << 'PYEOF'
        import sys, json
        imgs = json.load(sys.stdin)
        digests = imgs[0].get('RepoDigests', [''])
        print(digests[0] if digests else '')
        PYEOF

        LOCAL_DIGEST=$(docker inspect \
          {{Param.ECR_REGISTRY}}/{{Param.COMFYUI_REPOSITORY}}:{{Param.COMFYUI_TAG}} 2>/dev/null \
          | python3 /tmp/get_digest.py \
          | grep -oP 'sha256:\w+' || echo "none")
        REMOTE_DIGEST=$(aws ecr describe-images --region {{Param.AWS_REGION}} \
          --repository-name {{Param.COMFYUI_REPOSITORY}} \
          --image-ids imageTag={{Param.COMFYUI_TAG}} \
          --query 'imageDetails[0].imageDigest' --output text 2>/dev/null || echo "unknown")
        rm -f /tmp/get_digest.py

        echo "Local digest:  $LOCAL_DIGEST"
        echo "Remote digest: $REMOTE_DIGEST"
        if [ "$LOCAL_DIGEST" = "$REMOTE_DIGEST" ] && [ "$LOCAL_DIGEST" != "none" ]; then
          echo "Image is current — skipping pull."
        else
          echo "Pulling image (this may take a while for large images)..."
          docker pull {{Param.ECR_REGISTRY}}/{{Param.COMFYUI_REPOSITORY}}:{{Param.COMFYUI_TAG}}
        fi

        # --- Start ComfyUI container ---
        echo ""
        echo "Starting ComfyUI container..."
        CONTAINER_ID=$(docker run -d \
          --runtime=nvidia \
          --gpus all \
          -e NVIDIA_VISIBLE_DEVICES=all \
          -e NVIDIA_DRIVER_CAPABILITIES=compute,utility \
          --network host \
          --name comfyui-gui \
          {{Param.ECR_REGISTRY}}/{{Param.COMFYUI_REPOSITORY}}:{{Param.COMFYUI_TAG}})

        echo "Container started: $CONTAINER_ID"

        # --- Wait for ComfyUI to be ready ---
        echo "Waiting for ComfyUI on port {{Param.COMFYUI_PORT}}..."
        READY=false
        for i in $(seq 1 180); do
          if curl -s --max-time 2 http://localhost:{{Param.COMFYUI_PORT}}/ > /dev/null 2>&1; then
            echo "ComfyUI is ready!"
            READY=true
            break
          fi
          if [ $((i % 15)) -eq 0 ]; then
            echo "Still waiting... ($i/180)"
            docker logs comfyui-gui 2>&1 | tail -5
          fi
          sleep 2
        done

        if [ "$READY" != "true" ]; then
          echo "ERROR: ComfyUI failed to start within 360s"
          docker logs comfyui-gui
          docker stop comfyui-gui || true
          docker rm comfyui-gui || true
          exit 1
        fi

        # ==============================================
        # PHASE 2: Register SSM managed node
        # ==============================================

        echo ""
        echo "Downloading ssm-setup-cli..."
        mkdir -p /tmp/ssm
        SSM_URL="https://amazon-ssm-{{Param.AWS_REGION}}.s3.{{Param.AWS_REGION}}.amazonaws.com/latest/linux_amd64/ssm-setup-cli"
        curl -sS "$SSM_URL" -o /tmp/ssm/ssm-setup-cli
        sudo chmod +x /tmp/ssm/ssm-setup-cli
        echo "ssm-setup-cli downloaded OK"

        # Ensure root's gnupg directory exists for GPG signature verification
        sudo mkdir -p /root/.gnupg
        sudo chmod 700 /root/.gnupg

        echo ""
        echo "Registering with SSM..."
        sudo /tmp/ssm/ssm-setup-cli \
          -register \
          -activation-code "{{Param.ActivationCode}}" \
          -activation-id "{{Param.ActivationId}}" \
          -region "{{Param.AWS_REGION}}" \
        || {
          echo "WARNING: Registration with signature validation failed, retrying with -skip-signature-validation..."
          sudo /tmp/ssm/ssm-setup-cli \
            -register \
            -activation-code "{{Param.ActivationCode}}" \
            -activation-id "{{Param.ActivationId}}" \
            -region "{{Param.AWS_REGION}}" \
            -skip-signature-validation
        }
        echo "Registration complete."

        # --- Extract managed node ID ---
        cat > /tmp/get_node_id.py << 'PYEOF'
        import json, sys
        data = json.load(sys.stdin)
        print(data["ManagedInstanceID"])
        PYEOF

        MANAGED_NODE_ID=$(sudo cat /var/lib/amazon/ssm/registration | python3 /tmp/get_node_id.py)
        rm -f /tmp/get_node_id.py

        # ==============================================
        # PHASE 3: Print connection instructions
        # ==============================================

        echo ""
        echo "=============================================="
        echo "=============================================="
        echo ""
        echo "  ComfyUI is READY on port {{Param.COMFYUI_PORT}}"
        echo "  SSM Managed Node ID: $MANAGED_NODE_ID"
        echo ""
        echo "  Connect with port forwarding:"
        echo ""
        echo "    aws ssm start-session --target $MANAGED_NODE_ID --region {{Param.AWS_REGION}} \\"
        echo "      --document-name AWS-StartPortForwardingSession \\"
        echo "      --parameters '{\"portNumber\":[\"{{Param.COMFYUI_PORT}}\"],\"localPortNumber\":[\"{{Param.COMFYUI_PORT}}\"]}'"
        echo ""
        echo "  Then open: http://localhost:{{Param.COMFYUI_PORT}}"
        echo ""
        echo "  Or interactive shell:"
        echo ""
        echo "    aws ssm start-session --target $MANAGED_NODE_ID --region {{Param.AWS_REGION}}"
        echo ""
        echo "  Session will stay alive for {{Param.SessionMinutes}} minutes."
        echo ""
        echo "=============================================="
        echo "=============================================="
        echo ""

        # ==============================================
        # PHASE 4: Keep alive loop
        # ==============================================

        TOTAL_SECONDS=$(({{Param.SessionMinutes}} * 60))
        ELAPSED=0
        INTERVAL=60
        echo "Keeping session alive for {{Param.SessionMinutes}} minutes..."
        echo ""
        while [ $ELAPSED -lt $TOTAL_SECONDS ]; do
          sleep $INTERVAL
          ELAPSED=$((ELAPSED + INTERVAL))
          REMAINING=$(( (TOTAL_SECONDS - ELAPSED) / 60 ))

          # Check ComfyUI container is still running
          if ! docker ps | grep -q comfyui-gui; then
            echo "WARNING: ComfyUI container stopped unexpectedly!"
            docker logs comfyui-gui 2>&1 | tail -20
            echo "Attempting restart..."
            docker start comfyui-gui 2>/dev/null || true
          fi

          # Verify SSM agent is still running
          if ! sudo systemctl is-active --quiet amazon-ssm-agent 2>/dev/null; then
            echo "WARNING: amazon-ssm-agent is not running, attempting restart..."
            sudo systemctl start amazon-ssm-agent 2>/dev/null || true
          fi

          # Print status with GPU stats
          GPU_STATS=$(nvidia-smi --query-gpu=utilization.gpu,memory.used,memory.total --format=csv,noheader,nounits 2>/dev/null \
            | awk -F', ' '{printf "GPU: %s%% | VRAM: %sMiB/%sMiB", $1, $2, $3}' || echo "GPU: N/A")
          echo "[$(date)] SSM=$MANAGED_NODE_ID | ${GPU_STATS} | ${REMAINING}m remaining"
        done

        # ==============================================
        # PHASE 5: Cleanup
        # ==============================================

        echo ""
        echo "Session ended. Cleaning up..."

        # Stop and remove ComfyUI container
        echo "Stopping ComfyUI container..."
        docker stop comfyui-gui || true
        docker rm comfyui-gui || true
        docker container prune -f

        # Deregister SSM managed node
        echo "Deregistering SSM managed node..."
        sudo amazon-ssm-agent -register -clear 2>/dev/null || true
        sudo systemctl stop amazon-ssm-agent 2>/dev/null || true
        rm -f /tmp/ssm/ssm-setup-cli

        echo "=============================================="
        echo "ComfyUI GUI session ended."
        echo "=============================================="
