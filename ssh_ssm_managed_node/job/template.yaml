specificationVersion: 'jobtemplate-2023-09'
name: SSM-Managed-Node
parameterDefinitions:
- name: Message
  type: STRING
  default: Starting SSM Managed Node registration
- name: ActivationCode
  type: STRING
  description: >
    SSM hybrid activation code from aws ssm create-activation.
    Generated by the submit script before job submission.
- name: ActivationId
  type: STRING
  description: >
    SSM hybrid activation ID from aws ssm create-activation.
    Generated by the submit script before job submission.
- name: AWS_REGION
  type: STRING
  default: us-west-2
  description: Region where the activation was created and where to download ssm-setup-cli.
- name: SessionMinutes
  type: INT
  default: 60
  description: How many minutes to keep the managed node registered and the job alive.
steps:
- name: RegisterSSMNode
  script:
    actions:
      onRun:
        command: bash
        args: ['{{Task.File.Run}}']
    embeddedFiles:
    - name: Run
      type: TEXT
      data: |
        #!/bin/bash
        set -e

        echo '{{Param.Message}}'
        echo "=============================================="
        echo "SSM Managed Node Registration"
        echo "=============================================="
        echo "User: $(whoami)"
        echo "Dir:  $(pwd)"
        echo "Host: $(hostname)"
        echo "Region: {{Param.AWS_REGION}}"
        echo "Session: {{Param.SessionMinutes}} minutes"
        echo ""

        # --- Download ssm-setup-cli from the correct region ---
        echo "Downloading ssm-setup-cli..."
        mkdir -p /tmp/ssm
        SSM_URL="https://amazon-ssm-{{Param.AWS_REGION}}.s3.{{Param.AWS_REGION}}.amazonaws.com/latest/linux_amd64/ssm-setup-cli"
        echo "URL: $SSM_URL"
        curl -sS "$SSM_URL" -o /tmp/ssm/ssm-setup-cli
        sudo chmod +x /tmp/ssm/ssm-setup-cli
        echo "ssm-setup-cli downloaded OK"

        # --- Ensure root's gnupg directory exists for GPG signature verification ---
        sudo mkdir -p /root/.gnupg
        sudo chmod 700 /root/.gnupg

        # --- Register with SSM using the activation credentials ---
        echo ""
        echo "Registering with SSM..."
        sudo /tmp/ssm/ssm-setup-cli \
          -register \
          -activation-code "{{Param.ActivationCode}}" \
          -activation-id "{{Param.ActivationId}}" \
          -region "{{Param.AWS_REGION}}" \
        || {
          echo "WARNING: Registration with signature validation failed, retrying with -skip-signature-validation..."
          sudo /tmp/ssm/ssm-setup-cli \
            -register \
            -activation-code "{{Param.ActivationCode}}" \
            -activation-id "{{Param.ActivationId}}" \
            -region "{{Param.AWS_REGION}}" \
            -skip-signature-validation
        }
        echo "Registration complete."

        # --- Extract and print the managed node ID ---
        # Write a helper script to a temp file (avoid inline python3 -c)
        cat > /tmp/get_node_id.py << 'PYEOF'
        import json, sys
        data = json.load(sys.stdin)
        print(data["ManagedInstanceID"])
        PYEOF

        MANAGED_NODE_ID=$(sudo cat /var/lib/amazon/ssm/registration | python3 /tmp/get_node_id.py)

        echo ""
        echo "=============================================="
        echo "SSM Managed Node ID: $MANAGED_NODE_ID"
        echo "=============================================="
        echo ""
        echo "Connect with:"
        echo "  aws ssm start-session --target $MANAGED_NODE_ID --region {{Param.AWS_REGION}}"
        echo ""

        # --- Keep alive for SessionMinutes ---
        TOTAL_SECONDS=$(({{Param.SessionMinutes}} * 60))
        ELAPSED=0
        INTERVAL=60
        echo "Keeping session alive for {{Param.SessionMinutes}} minutes..."
        echo ""
        while [ $ELAPSED -lt $TOTAL_SECONDS ]; do
          sleep $INTERVAL
          ELAPSED=$((ELAPSED + INTERVAL))
          REMAINING=$(( (TOTAL_SECONDS - ELAPSED) / 60 ))
          echo "[$(date)] SSM node $MANAGED_NODE_ID active. ${REMAINING}m remaining."

          # Verify SSM agent is still running
          if ! sudo systemctl is-active --quiet amazon-ssm-agent 2>/dev/null; then
            echo "WARNING: amazon-ssm-agent is not running, attempting restart..."
            sudo systemctl start amazon-ssm-agent 2>/dev/null || true
          fi
        done

        # --- Cleanup / Deregister ---
        echo ""
        echo "Session ended. Deregistering managed node..."
        sudo amazon-ssm-agent -register -clear 2>/dev/null || true
        sudo systemctl stop amazon-ssm-agent 2>/dev/null || true
        rm -f /tmp/ssm/ssm-setup-cli /tmp/get_node_id.py
        echo "Cleanup complete."
        echo "=============================================="
        echo "SSM Managed Node session ended."
        echo "=============================================="
